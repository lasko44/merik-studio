name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - beta
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    name: Run Tests
    uses: ./.github/workflows/tests.yml

  release:
    name: Create Release
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous tag
        id: previous_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: version
        run: |
          PREV_TAG=${{ steps.previous_tag.outputs.tag }}

          # Get commits since last tag
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || echo "")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || echo "")
          fi

          # Check if there are any commits
          if [ -z "$COMMITS" ]; then
            echo "No new commits since last release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Commits since $PREV_TAG:"
          echo "$COMMITS"

          # Determine bump type based on conventional commits
          MAJOR=0
          MINOR=0
          PATCH=0

          while IFS= read -r commit; do
            if [[ "$commit" =~ ^feat!:|^fix!:|^refactor!:|BREAKING[[:space:]]CHANGE ]]; then
              MAJOR=1
            elif [[ "$commit" =~ ^feat:|^feat\( ]]; then
              MINOR=1
            elif [[ "$commit" =~ ^fix:|^fix\(|^perf:|^perf\( ]]; then
              PATCH=1
            fi
          done <<< "$COMMITS"

          # Parse current version
          CURRENT=${PREV_TAG#v}
          IFS='.' read -r CUR_MAJOR CUR_MINOR CUR_PATCH <<< "$CURRENT"

          # Calculate new version
          if [ $MAJOR -eq 1 ]; then
            NEW_MAJOR=$((CUR_MAJOR + 1))
            NEW_VERSION="${NEW_MAJOR}.0.0"
            BUMP_TYPE="major"
          elif [ $MINOR -eq 1 ]; then
            NEW_MINOR=$((CUR_MINOR + 1))
            NEW_VERSION="${CUR_MAJOR}.${NEW_MINOR}.0"
            BUMP_TYPE="minor"
          elif [ $PATCH -eq 1 ]; then
            NEW_PATCH=$((CUR_PATCH + 1))
            NEW_VERSION="${CUR_MAJOR}.${CUR_MINOR}.${NEW_PATCH}"
            BUMP_TYPE="patch"
          else
            echo "No conventional commits found that trigger a release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Bump type: $BUMP_TYPE"
          echo "New version: $NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update version.json
        if: steps.version.outputs.skip != 'true'
        run: |
          cat > version.json << EOF
          {
              "version": "${{ steps.version.outputs.new_version }}",
              "release_date": "$(date +%Y-%m-%d)",
              "minimum_php": "8.2",
              "minimum_laravel": "12.0"
          }
          EOF

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        id: changelog
        run: |
          PREV_TAG=${{ steps.previous_tag.outputs.tag }}

          # Generate changelog from commits
          {
            echo "## What's Changed"
            echo ""

            # Features
            if [ "$PREV_TAG" = "v0.0.0" ]; then
              FEATURES=$(git log --pretty=format:"- %s" --grep="^feat" 2>/dev/null || echo "")
            else
              FEATURES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null || echo "")
            fi
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES" | sed 's/^- feat[(:]/- /' | sed 's/): /: /'
              echo ""
            fi

            # Bug Fixes
            if [ "$PREV_TAG" = "v0.0.0" ]; then
              FIXES=$(git log --pretty=format:"- %s" --grep="^fix" 2>/dev/null || echo "")
            else
              FIXES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null || echo "")
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^- fix[(:]/- /' | sed 's/): /: /'
              echo ""
            fi

            # Performance
            if [ "$PREV_TAG" = "v0.0.0" ]; then
              PERF=$(git log --pretty=format:"- %s" --grep="^perf" 2>/dev/null || echo "")
            else
              PERF=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^perf" 2>/dev/null || echo "")
            fi
            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF" | sed 's/^- perf[(:]/- /' | sed 's/): /: /'
              echo ""
            fi

            echo "---"
            echo ""
            echo "## Upgrade Instructions"
            echo ""
            echo '```bash'
            echo "git fetch origin"
            echo "git checkout ${{ steps.version.outputs.new_tag }}"
            echo "composer install --no-dev"
            echo "php artisan migrate"
            echo "npm install && npm run build"
            echo "php artisan optimize"
            echo '```'
          } > CHANGELOG_BODY.md

          cat CHANGELOG_BODY.md

      - name: Commit version bump
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore(release): ${{ steps.version.outputs.new_tag }}" || echo "No changes to commit"
          git push

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag -a ${{ steps.version.outputs.new_tag }} -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
